name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Azure Function (Node.js Backend)
  # ──────────────────────────────────────────────
  deploy-function:
    name: Deploy Azure Function
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Abhängigkeiten installieren
        run: npm install
        working-directory: function

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: ./function
          publish-profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE }}

  # ──────────────────────────────────────────────
  # Job 2: React Dashboard (Static Web App)
  # ──────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy React Dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package.json

      - name: Abhängigkeiten installieren
        run: npm install
        working-directory: dashboard

      - name: Build
        run: npm run build
        working-directory: dashboard
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dashboard
          output_location: dist
